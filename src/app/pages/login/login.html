<div class="login-wrapper">
  <div class="login-card">
    <h1 class="login-title">Iniciar sesión</h1>

    <form class="login-form" (ngSubmit)="login()" [formGroup]="credentials">
      <div class="form-group">
        <label for="email" class="form-label">Correo electrónico</label>
        <input type="email" id="email" class="form-control" placeholder="tu@email.com" formControlName="email"
          autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" formControlName="password"
          autocomplete="current-password" />
      </div>

      <button type="submit" class="btn-primary" [disabled]="!credentials.valid || credentials.pending">
        Acceder
      </button>
    </form>

    <div class="login-footer">
      <span>¿No tienes cuenta?</span>
      <a routerLink="/register" class="link-primary">Crear cuenta</a>
    </div>
  </div>
</div>
